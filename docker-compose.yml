services:
  identity-service:
    build: ./identity-service
    container_name: identity-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: unless-stopped

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - IDENTITY_URL=http://identity-service:3001
      - INVENTORY_URL=http://inventory-service:3002
      - PAYMENT_URL=http://payment-service:3003
    depends_on:
      - identity-service
      - inventory-service
      - payment-service
    restart: unless-stopped